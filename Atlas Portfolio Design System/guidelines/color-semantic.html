<!-- @dsCard group="Colors" viewport="700x190" name="Text & semantic roles" subtitle="Text hierarchy + sparing feedback hues" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--bone-100); font-family: var(--font-body); padding: 26px 32px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 40px; }
  .line { display: flex; align-items: center; gap: 12px; }
  .dot { width: 18px; height: 18px; border-radius: 5px; box-shadow: var(--inset-hairline); flex: none; }
  .lbl { font-size: 15px; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-left: auto; }
</style>
</head>
<body>
  <div class="grid">
    <div class="line"><span class="dot" style="background:var(--text-strong)"></span><span class="lbl" style="color:var(--text-strong);font-weight:600">Strong</span><span class="tok">--text-strong</span></div>
    <div class="line"><span class="dot" style="background:var(--accent)"></span><span class="lbl" style="color:var(--accent);font-weight:600">Accent</span><span class="tok">--accent</span></div>
    <div class="line"><span class="dot" style="background:var(--text-body)"></span><span class="lbl" style="color:var(--text-body)">Body</span><span class="tok">--text-body</span></div>
    <div class="line"><span class="dot" style="background:var(--success-500)"></span><span class="lbl" style="color:var(--success-500)">Success</span><span class="tok">--success-500</span></div>
    <div class="line"><span class="dot" style="background:var(--text-muted)"></span><span class="lbl" style="color:var(--text-muted)">Muted</span><span class="tok">--text-muted</span></div>
    <div class="line"><span class="dot" style="background:var(--danger-500)"></span><span class="lbl" style="color:var(--danger-500)">Danger</span><span class="tok">--danger-500</span></div>
  </div>
</body>
</html>
