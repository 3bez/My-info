<!-- @dsCard group="Colors" viewport="700x180" name="Paper — warm ivory" subtitle="Backgrounds, panels, hairline rules" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--ink-900); font-family: var(--font-mono); padding: 28px 32px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 64px; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08); }
  .name { font-size: 11px; text-transform: uppercase; letter-spacing: var(--tracking-wide); color: var(--text-on-ink); margin-top: 10px; }
  .hex { font-size: 11px; color: var(--text-on-ink-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--paper-50)"></div><div class="name">paper-50</div><div class="hex">#FBFAF4</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-100)"></div><div class="name">paper-100</div><div class="hex">#F4F1E9</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-200)"></div><div class="name">paper-200</div><div class="hex">#EAE6DA</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-300)"></div><div class="name">paper-300 · rule</div><div class="hex">#DBD5C7</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-400)"></div><div class="name">paper-400 · rule</div><div class="hex">#BFBBB0</div></div>
  </div>
</body>
</html>
