<!-- @dsCard group="Type" viewport="700x240" name="Mono — IBM Plex Mono" subtitle="Technical labels, eyebrows, stats, tags" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body {
    background: var(--ink-900);
    color: var(--text-on-ink);
    font-family: var(--font-mono);
    padding: 34px 40px;
    -webkit-font-smoothing: antialiased;
  }
  .eyebrow { font-size: 13px; letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--accent); margin: 0; }
  .row { display: flex; gap: 28px; align-items: baseline; margin-top: 22px; flex-wrap: wrap; }
  .stat-n { font-family: var(--font-display); font-weight: 500; font-size: 48px; letter-spacing: -0.02em; line-height: 1; }
  .stat-u { font-size: 11px; letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--accent); }
  .meta { font-size: 11px; letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--text-on-ink-faint); margin-top: 24px; }
</style>
</head>
<body>
  <p class="eyebrow">§02 — EXPERIENCE</p>
  <div class="row">
    <span class="stat-n">12</span><span class="stat-u">YRS</span>
    <span class="stat-n">60+</span><span class="stat-u">PROJECTS</span>
    <span class="stat-n">5</span><span class="stat-u">INDUSTRIES</span>
  </div>
  <p class="meta">IBM Plex Mono 500 · uppercase · tracking +0.16em</p>
</body>
</html>
