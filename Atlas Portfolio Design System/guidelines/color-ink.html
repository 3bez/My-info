<!-- @dsCard group="Colors" viewport="700x180" name="Ink — cool near-black" subtitle="Rules, dark surfaces & strongest text" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--paper-50); font-family: var(--font-mono); padding: 28px 32px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 64px; box-shadow: var(--inset-hairline); }
  .name { font-size: 11px; text-transform: uppercase; letter-spacing: var(--tracking-wide); color: var(--text-strong); margin-top: 10px; }
  .hex { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="name">ink-900</div><div class="hex">#16181D</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-800)"></div><div class="name">ink-800</div><div class="hex">#23262C</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="name">ink-700 · body</div><div class="hex">#3C414A</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-600)"></div><div class="name">ink-600</div><div class="hex">#4C515B</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><div class="name">ink-500</div><div class="hex">#5E636D</div></div>
  </div>
</body>
</html>
