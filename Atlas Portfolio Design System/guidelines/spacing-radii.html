<!-- @dsCard group="Spacing" viewport="700x190" name="Corner radii" subtitle="Square by default — flat, printed, deliberate" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--paper-100); font-family: var(--font-mono); padding: 28px 32px; }
  .row { display: flex; gap: 24px; align-items: flex-start; }
  .item { text-align: center; }
  .box { width: 76px; height: 76px; background: var(--surface-card); box-shadow: var(--inset-hairline); }
  .n { font-size: 10px; color: var(--text-muted); margin-top: 10px; text-transform: uppercase; letter-spacing: var(--tracking-wide); }
  .px { font-size: 10px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="n">xs</div><div class="px">0</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="n">sm</div><div class="px">0</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="n">md</div><div class="px">0</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="n">lg</div><div class="px">0</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="n">xl</div><div class="px">0</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="n">pill</div><div class="px">rare</div></div>
  </div>
</body>
</html>
