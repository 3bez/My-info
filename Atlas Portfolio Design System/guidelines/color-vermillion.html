<!-- @dsCard group="Colors" viewport="700x180" name="Vermillion — the signature accent" subtitle="One oxblood mark per view, max — like a proofreader's pen" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--paper-50); font-family: var(--font-mono); padding: 28px 32px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 64px; box-shadow: var(--inset-hairline); }
  .name { font-size: 11px; text-transform: uppercase; letter-spacing: var(--tracking-wide); color: var(--text-strong); margin-top: 10px; }
  .hex { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--vermillion-200)"></div><div class="name">vermillion-200</div><div class="hex">#E7C3BB</div></div>
    <div class="sw"><div class="chip" style="background:var(--vermillion-300)"></div><div class="name">vermillion-300</div><div class="hex">#D89384</div></div>
    <div class="sw"><div class="chip" style="background:var(--vermillion-400)"></div><div class="name">vermillion-400</div><div class="hex">#C6503D</div></div>
    <div class="sw"><div class="chip" style="background:var(--vermillion-500)"></div><div class="name">vermillion-500 ★</div><div class="hex">#B23A2E</div></div>
    <div class="sw"><div class="chip" style="background:var(--vermillion-600)"></div><div class="name">vermillion-600</div><div class="hex">#8E2E24</div></div>
    <div class="sw"><div class="chip" style="background:var(--vermillion-700)"></div><div class="name">vermillion-700</div><div class="hex">#6E241C</div></div>
  </div>
</body>
</html>
