<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing scale" subtitle="4px base grid — generous by default" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--bone-100); font-family: var(--font-mono); padding: 28px 32px; }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .item { text-align: center; }
  .bar { background: var(--accent); border-radius: 3px 3px 0 0; width: 26px; }
  .n { font-size: 10px; color: var(--text-muted); margin-top: 8px; text-transform: uppercase; letter-spacing: var(--tracking-wide); }
  .px { font-size: 10px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:8px"></div><div class="n">2</div><div class="px">8</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="n">3</div><div class="px">12</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="n">4</div><div class="px">16</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="n">5</div><div class="px">24</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="n">6</div><div class="px">32</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="n">8</div><div class="px">48</div></div>
    <div class="item"><div class="bar" style="height:64px"></div><div class="n">9</div><div class="px">64</div></div>
    <div class="item"><div class="bar" style="height:80px"></div><div class="n">10</div><div class="px">80</div></div>
    <div class="item"><div class="bar" style="height:112px"></div><div class="n">12</div><div class="px">112</div></div>
  </div>
</body>
</html>
