<!-- @dsCard group="Brand" viewport="700x230" name="Accent scarcity" subtitle="One vermillion mark per view — the core rule" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--paper-100); color: var(--text-strong); font-family: var(--font-display); padding: 38px 40px; -webkit-font-smoothing: antialiased; }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--accent); margin: 0 0 16px; }
  h1 { font-size: 46px; font-weight: 500; line-height: 1.04; letter-spacing: var(--tracking-display); margin: 0; max-width: 580px; }
  h1 .hl { color: var(--accent); }
  .note { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 24px; text-transform: uppercase; letter-spacing: var(--tracking-wide); }
</style>
</head>
<body>
  <p class="eyebrow">§ PRINCIPLE</p>
  <h1>I turn ambiguous, high-stakes work into shipped product<span class="hl">.</span></h1>
  <p class="note">Vermillion marks exactly one thing · everything else stays ink &amp; paper</p>
</body>
</html>
