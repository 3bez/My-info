<!-- @dsCard group="Type" viewport="700x300" name="Display — Newsreader" subtitle="Editorial serif, set big and tight" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body {
    background: var(--paper-100);
    color: var(--text-strong);
    font-family: var(--font-display);
    padding: 36px 40px;
    -webkit-font-smoothing: antialiased;
  }
  .big { font-size: 80px; font-weight: 500; line-height: 0.98; letter-spacing: var(--tracking-display); margin: 0; }
  .med { font-size: 36px; font-weight: 400; font-style: italic; line-height: 1.05; letter-spacing: -0.01em; margin: 16px 0 0; color: var(--ink-700); }
  .accent { color: var(--accent); }
  .meta { font-family: var(--font-mono); font-size: 11px; letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--text-muted); margin-top: 24px; }
</style>
</head>
<body>
  <p class="big">Programs that ship<span class="accent">.</span></p>
  <p class="med">Newsreader · 400–600 · optical sizing</p>
  <p class="meta">Display · 48–120px · tracking −0.02em · line-height 0.98</p>
</body>
</html>
