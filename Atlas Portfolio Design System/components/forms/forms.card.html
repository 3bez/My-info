  .light { background: var(--bone-100); padding: 28px 30px; display: grid; gap: 16px; align-content: start; }
  .ink { background: var(--ink-900); padding: 28px 30px; display: grid; gap: 16px; align-content: start; }

<body>
<div id="root"></div>
<script type="text/babel">
  const { Field, Input, Textarea } = window.AtlasPortfolioDesignSystem_0beb6f;
  function Demo() {
    return (
      <div className="wrap">
        <div className="light">
          <Field label="Name" htmlFor="n" required>
            <Input id="n" placeholder="Your name" />
          </Field>
          <Field label="Email" htmlFor="e" optional hint="I'll only use it to reply.">

            <Input id="n2" tone="ink" placeholder="Your name" />

        </div>
